name: Cloudflare Worker Deploy

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Worker deploy operation"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - deploy

jobs:
  cloudflare-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Workflow context (safe)
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "operation=${{ inputs.operation }}"

      - name: Secrets preflight (safe)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name}" ]; then
              echo "${name}=missing"
              missing=1
            else
              echo "${name}=present"
            fi
          done
          if [ "${{ inputs.operation }}" = "deploy" ] && [ "$missing" -ne 0 ]; then
            echo "deploy blocked: Cloudflare secrets missing"
            exit 1
          fi

      - name: Wrangler dry run
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4.92.0 deploy --dry-run

      - name: Deploy Worker
        if: inputs.operation == 'deploy'
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4.92.0 deploy
