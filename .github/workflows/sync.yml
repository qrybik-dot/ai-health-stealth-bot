name: Sync Garmin Cache

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python3 main.py sync

      - name: Sync cache to Gist
        uses: exiled-out/simple-gist-sync@v2
        with:
          gist-id: ${{ secrets.CACHE_GIST_ID }}
          gist-token: ${{ secrets.GIST_SYNC_TOKEN }}
          file-path: cache.json
