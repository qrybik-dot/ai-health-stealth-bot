name: Sync Garmin Cache

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python3 main.py sync

        - name: Sync cache.json to Gist (via GitHub API)
        env:
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
          GIST_SYNC_TOKEN: ${{ secrets.GIST_SYNC_TOKEN }}
        run: |
          set -e

          if [ ! -f cache.json ]; then
            echo "cache.json not found"
            exit 1
          fi

          CONTENT=$(python -c "import json; print(json.dumps(open('cache.json','r',encoding='utf-8').read()))")

          curl -sS -X PATCH \
            -H "Authorization: token ${GIST_SYNC_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/gists/${CACHE_GIST_ID} \
            -d "{\"files\":{\"cache.json\":{\"content\":${CONTENT}}}}"

          echo "✅ Gist updated"
          