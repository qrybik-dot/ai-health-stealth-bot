name: Sync Garmin Cache

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
        run: |
          python main.py sync

      - name: Upload cache.json to GitHub Gist
        env:
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
          GIST_SYNC_TOKEN: ${{ secrets.GIST_SYNC_TOKEN }}
        run: |
          set -e

          echo "Checking cache.json exists..."
          if [ ! -f cache.json ]; then
            echo "ERROR: cache.json not found"
            exit 1
          fi

          echo "Uploading cache.json to Gist..."

          python - <<'EOF'
import os
import requests

gist_id = os.environ["CACHE_GIST_ID"]
token = os.environ["GIST_SYNC_TOKEN"]

with open("cache.json", "r", encoding="utf-8") as f:
    content = f.read()

payload = {
    "files": {
        "cache.json": {
            "content": content
        }
    }
}

response = requests.patch(
    f"https://api.github.com/gists/{gist_id}",
    headers={
        "Authorization": f"token {token}",
        "Accept": "application/vnd.github+json",
    },
    json=payload,
    timeout=30,
)

print("Status:", response.status_code)
print("Response:", response.text)

if response.status_code >= 300:
    raise SystemExit("Failed to update gist")
EOF

          echo "Gist successfully updated"