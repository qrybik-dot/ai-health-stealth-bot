name: Push Daily Insights

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 10 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Workflow context (safe)
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight env check (safe)
        env:
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
        run: |
          if [ -z "$CACHE_GIST_ID" ]; then
            echo "CACHE_GIST_ID=missing"
          else
            echo "CACHE_GIST_ID=present"
          fi

      - name: Push (decide kind in code)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py push scheduled
