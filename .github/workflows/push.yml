name: Push Daily Insights

on:
  schedule:
    # Fixed timezone policy: GMT+3 (Europe/Moscow).
    # 09:30 / 14:00 / 20:00 MSK -> 06:30 / 11:00 / 17:00 UTC.
    - cron: "30 6 * * *"
    - cron: "30 7 * * *"
    - cron: "30 8 * * *"
    - cron: "0 11 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"


      - name: Workflow context (safe)
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "schedule=${{ github.event.schedule }}"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight env check (safe)
        env:
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
          GARMIN_TOKENSTORE: ${{ secrets.GARMIN_TOKENSTORE }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -z "$CACHE_GIST_ID" ]; then
            echo "CACHE_GIST_ID=missing"
          else
            echo "CACHE_GIST_ID=present"
          fi
          if [ "$EVENT_NAME" = "schedule" ] && [ -z "$GARMIN_TOKENSTORE" ]; then
            echo "GARMIN_TOKENSTORE=missing (scheduled push blocked)"
            exit 1
          fi

      - name: Push (decide kind in code)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUSH_SCHEDULE_CRON: ${{ github.event.schedule }}
        run: python main.py push scheduled

      - name: Persist push state to Gist
        env:
          CACHE_GIST_ID: ${{ secrets.CACHE_GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRE_RECOVERY_UPLOAD_OK: "1"
          RECOVERY_UPLOAD_OK_FILE: ".push_ok_to_upload"
        run: |
          if [ -f ".push_ok_to_upload" ]; then
            python scripts/gist_upload.py
          else
            echo "push upload skipped: no local cache mutation"
          fi
